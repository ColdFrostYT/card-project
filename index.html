<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ColdFrost's Page</title>
<link rel="icon" href="favicon.png">

<style>
html{
    scroll-behavior: smooth;
}

/* BACKGROUND */
body {
    background: linear-gradient(135deg, #4f46e5, #9333ea, #06b6d4);
    background-size: 300% 300%;
    min-height: 100vh;
    margin: 0;
    animation: gradientMove 8s ease infinite;
}

@keyframes gradientMove {
    0% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
}

/* NAVBAR */
.navbar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 15px 40px;
    background: rgba(255,255,255,0.1);
    backdrop-filter: blur(12px);
    font-size: 20px;
    width: 100%;
    box-sizing: border-box;
    position: sticky;
    top: 0;
    z-index: 100;
}

.navbar a {
    color: white;
    text-decoration: none;
    margin: 0 15px;
    position: relative;
    transition: 0.3s;
}

.navbar a:hover {
    color: cyan;
}

.logo {
    font-size: 22px;
    font-weight: bold;
    color: cyan;
}

/* HERO SECTIONS */
.hero {
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
}

/* GLASS CARD */
.card {
    background: rgba(255, 255, 255, 0.1);
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);

    padding: 25px;
    border-radius: 20px;
    width: 300px;
    text-align: center;
    box-shadow: 0 10px 25px rgba(0,0,0,0.3);
    border: 1px solid rgba(255,255,255,0.2);
    transition: 0.3s;
}

.card:hover {
    transform: translateY(-10px);
}

/* IMAGE */
img {
    border-radius: 50%;
    width: 120px;
}

/* NAME */
.name p {
    color: white;
    font-size: 35px;
    margin: 10px 0;
}

/* BUTTONS */
.buttons {
    display: flex;
    flex-direction: column;
    gap: 15px;
    margin-top: 15px;
}

.btn {
    display: inline-block;
    color: cyan;
    padding: 12px 25px;
    border-radius: 12px;
    text-decoration: none;
    font-size: 18px;
    border: 2px solid cyan;
    box-shadow: 0 0 10px cyan;
    transition: 0.3s;
}

.btn:hover {
    box-shadow: 0 0 25px cyan, 0 0 50px cyan;
    transform: scale(1.05);
}

/* ABOUT CARD TEXT */
.about-text {
    color: white;
    font-size: 16px;
    line-height: 1.5;
}

/* LOADER */
.loader {
    position: fixed;
    inset: 0;
    background: #0f0f1a;
    display: flex;
    justify-content: center;
    align-items: center;
    z-index: 9999;
    animation: fadeOut 3s forwards;
}

.bar {
    width: 140px;
    height: 4px;
    background: rgba(255,255,255,0.2);
    overflow: hidden;
    border-radius: 10px;
    position: relative;
}

.bar::before {
    content: "";
    position: absolute;
    width: 40%;
    height: 100%;
    background: cyan;
    animation: load 1.2s infinite;
}

@keyframes load {
    0% { left: -40%; }
    50% { left: 30%; }
    100% { left: 100%; }
}

@keyframes fadeOut {
    0%, 80% { opacity: 1; }
    100% { opacity: 0; visibility: hidden; pointer-events: none; }
}

.loader-content {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 15px;
}

</style>
</head>

<body>

<!-- LOADER -->
<div class="loader">
    <div class="loader-content">
        <img src="favicon.png">
        <div class="bar"></div>
    </div>
</div>

<!-- NAVBAR -->
<header class="navbar">
    <div class="logo">ColdFrost</div>
    <div>
        <a href="#home">Home</a>
        <a href="#about">About</a>
    </div>
</header>

<!-- HOME -->
<div id="home" class="hero">
    <div class="card">
        <img src="favicon.png">

        <div class="name">
            <p>ColdFrost</p>
        </div>

        <div class="buttons">
            <a href="https://www.youtube.com/@Coldfrostyt" class="btn">Subscribe</a>
            <a href="https://www.instagram.com/shresthanaman01/" class="btn">Follow</a>
        </div>
    </div>
</div>

<!-- ABOUT -->
<div id="about" class="hero">
    <div class="card">
        <h2 style="color:cyan; font-size:35px;">About Me</h2>

        <p class="about-text">
            Hi! I am ColdFrost. I create gaming videos and I love web development.  
            I am currently learning HTML, CSS and soon JavaScript.
        </p>
    </div>
</div>

</body>
</html>
