<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ColdFrost's Page</title>
    <style>
body {
    background: linear-gradient(135deg, #4f46e5, #9333ea);
    min-height: 100vh;
    margin: 0;
    display: flex;
    justify-content: center;
    align-items: flex-start;
}
       img {
    border-radius: 50%;
    width: 120px;
}
        p{
            color: rgb(255, 255, 255);
            
           text-align: center;
           font-size: 35px;
        }
        button{
            border-radius: 12px;
            font-size: 25px;
           
            
           

        }
       
        .buttons{
            display: flex;
            align-items: center;
            gap: 30px;
            flex-direction: column; 
        }
        .name{
       color: white;
        }
      button:hover{
        background-color: black;
        transform: scale(1.1);
        color: white;
        transition: 0.3s;
        cursor: pointer;
      }
      .btn{
    display: inline-block;
    background: transparent;
    color: cyan;
    padding: 12px 25px;
    border-radius: 12px;
    text-decoration: none;
    font-size: 20px;
    border: 2px solid cyan;
    box-shadow: 0 0 10px cyan;
    transition: 0.3s;
    position: relative;
    overflow: hidden    ;

    
}
.btn:hover{

   
    box-shadow: 0 0 20px rgb(187, 0, 255),
                0 0 40px rgb(195, 0, 255);
    transform:  scale(1.05);
    
}

.card{
    background: rgba(255, 255, 255, 0.1);
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);

    padding: 25px;
    border-radius: 20px;
    width: 300px;
    text-align: center;
     box-shadow: 0 10px 25px rgba(0,0,0,0.3);
     transition: 0.3s;
     border: 1px solid rgba(255, 255, 255, 0.2  );
    margin-top: 10%;
}

.card:hover{
    transform: translateY(-10px);
}
.btn::before{
    content: "";
    position: absolute;
    top: 0;
    left: -100%;
    width: 100%;
    height: 100%;
    background: linear-gradient(120deg, transparent, cyan, transparent);
    transition: 0.5s;
}
      .btn:hover::before{
    left: 100%;
}

    </style>
</head>
<body>
   
  <div class="card">
     <img src="https://yt3.googleusercontent.com/LH5lYvB10kQSgQOtZ1qvfUOJ5X3_HY06zTau_QqiMZTQaERUtwRRQ0HKsGAxjpY3UkwVkaFB8A=s160-c-k-c0x00ffffff-no-rj">
    <div class="name">
    <p>
        ColdFrost
    </p>
</div>
<div class = "buttons">
   <a href="https://www.youtube.com/@Coldfrostyt" class="btn">Subscribe</a>
<a href="https://www.instagram.com/shresthanaman01/" class="btn">Follow</a>
</div>    
</div>
</body>
</html>
